spring:
  application:
    name: edurite-backend
  profiles:
    active: dev
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: redis

security:
  jwt:
    secret: 0123456789012345678901234567890123456789012345678901234567890123
    access-ttl-seconds: 3600

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
