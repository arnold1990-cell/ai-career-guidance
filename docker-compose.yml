version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: edurite
      POSTGRES_USER: edurite
      POSTGRES_PASSWORD: edurite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    image: maven:3.9.8-eclipse-temurin-21
    working_dir: /workspace/backend
    volumes:
      - ./backend:/workspace/backend
    command: sh -c "mvn spring-boot:run"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/edurite
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    volumes:
      - ./frontend:/workspace/frontend
    command: sh -c "echo 'Frontend Vite shell scaffold in place' && tail -f /dev/null"
    ports:
      - "5173:5173"

volumes:
  postgres_data:
