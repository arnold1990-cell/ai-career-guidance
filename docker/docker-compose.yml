version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: edurite-postgres
    environment:
      POSTGRES_DB: edurite
      POSTGRES_USER: edurite
      POSTGRES_PASSWORD: edurite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: edurite-redis
    ports:
      - "6379:6379"

  backend:
    image: eclipse-temurin:21-jre
    container_name: edurite-backend
    working_dir: /app
    command: ["sh", "-c", "echo 'TODO: replace with backend runtime command' && tail -f /dev/null"]
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

volumes:
  postgres_data:
