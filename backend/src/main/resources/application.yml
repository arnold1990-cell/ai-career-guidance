spring:
  application:
    name: edurite-backend
  profiles:
    active: dev

  data:
    redis:
      repositories:
        enabled: false

  cache:
    type: redis

security:
  jwt:
    secret: change-me-with-a-very-long-random-64-byte-secret-change-me-with-a-very-long-random-64-byte-secret
    access-token-expiration: 3600
    refresh-token-expiration: 604800

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

gemini:
  api-key: AIzaSyCo5MrVWRexb_hyec_74O_xIpG3uRfh0A4
  model: gemini-2.5-flash

edurite:
  university:
    crawl:
      cron: "0 0 2 * * *"
      timeout-ms: 8000
      max-fetch-retries: 3
      max-discovered-candidates-per-university: 60
      max-fetched-pages-per-university: 30
      max-crawl-depth: 1
      candidate-paths:
        - "/programmes"
        - "/programs"
        - "/study"
        - "/studies"
        - "/courses"
        - "/course-finder"
        - "/undergraduate"
        - "/postgraduate"
        - "/faculties"
        - "/admissions"
        - "/academic-programmes"
