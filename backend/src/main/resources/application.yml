spring:
  application:
    name: edurite-backend
  profiles:
    active: dev
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: redis

security:
  jwt:
    secret: ${EDURITE_JWT_SECRET:change-me-with-a-very-long-random-64-byte-secret-change-me-with-a-very-long-random-64-byte-secret}
    access-token-expiration: ${EDURITE_JWT_ACCESS_TOKEN_EXPIRATION:3600}
    refresh-token-expiration: ${EDURITE_JWT_REFRESH_TOKEN_EXPIRATION:604800}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

ai:
  gemini:
    enabled: ${AI_GEMINI_ENABLED:true}
    api-key: ${GOOGLE_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:20}
